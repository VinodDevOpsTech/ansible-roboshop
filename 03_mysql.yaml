- name: mysql configuration
  host: mysql
  become: yes
  task:
  - name: install mysql server
    package:
      name: mysql-server
      state: present

  - name: start and enable mysql
    service:
      name: mysqld
      state: started
      enabled: yes    
    
  - name: setting up user and password
    command:   mysql_secure_installation --set-root-pass RoboShop@1