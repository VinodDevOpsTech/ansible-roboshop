- name: ec2-instance management
  hosts: local
  connection: local
  become: yes
  vars:
    instances: ["mongodb", "redis", "mysql",  "rabbitmq"]
    image-id: ami-0220d79f3f480ecf5
    domain-name: maxdevops.online
    action: create
  tasks:
    amazon.aws.ec2_instance:
    name: "roboshop-{{ item }}"
    instance_type: "t3-micro"
    image_id: {{ image-id }}
    security_groups:
      roboshop-{{ item }}
      roboshop-common
      
    loop: {{ instances }}
