- name: configure payment server
  hosts: payment
  become: yes
  tasks:
  - name: install python
    package:
      name: "{{ item }}"
      state: present
    loop: 
    - python3
    - gcc
    - python3-devel

  - name: creating system user
    user: 
      name: roboshop
      home: /app
      system: true
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: deleteing /app directory
    file: 
      path: /app
      state:  absent

  - name: delete payment.zip
    file: 
      path: /tmp/payment.zip
      state: absent

  - name: making /app directory
    file: 
      path: /app
      state: directory

  - name: download shipping code
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip

  - name: remote access
    unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes
  - name: install depensencies
    pip:
      requirements: requirements.txt
      executable: pip3.9
    args:
      chdir: /app

  - name: copy payment service
    copy: 
      src: payment.service.j2
      dest: /etc/systemd/system/payment.service

  - name: systemd service
    systemd_service:
      deamon_reload: true

  - name: start and enable payment server
    service:
      name: payment
      state: started
      enabled: yes