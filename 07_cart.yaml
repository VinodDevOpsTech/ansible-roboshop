- name: configure cart server
  hosts: cart
  become: yes
  tasks:
  - name: enable node js
    command: dnf module enable nodejs:20 -y

  - name: install nodejs
    package: 
      name: nodejs
      state: present

  - name: creating sysetem user
    user: 
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: deleteing /app directory
    file: 
      path: /app
      state:  absent

  - name: delete cart.zip
    file: 
      path: /tmp/cart.zip
      state: absent

  - name: making /app directory
    file: 
      path: /app
      state: directory

  - name: download cart code
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
      dest: /tmp/cart.zip

  - name: remote access
    unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes

  - name: installing dependicies
    community.general.npm:
      path: /app

  - name: cart service
    service:
      src: cart.service.j2
      path: /etc/systemd/system/cart.service           
  - name: deamon reload
    systemd_service:
      name: cart
      daemon_reload: true

  - name: start and enable cart server
    service: 
      name: cart
      state: restarted
      enabled: yes 